services:
  postgres:
    image: postgres:16-alpine
    container_name: privateintent-db
    environment:
      POSTGRES_DB: privateintent
      POSTGRES_USER: privateintent
      POSTGRES_PASSWORD: privateintent123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privateintent -d privateintent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
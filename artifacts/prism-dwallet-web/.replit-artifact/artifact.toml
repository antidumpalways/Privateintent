kind = "web"
  previewPath = "/"
  title = "PrismDwallet"
  version = "1.0.0"
  id = "artifacts/sentinel-wallet"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 8081

  [services.development]
  run = "pnpm --filter @workspace/prism-dwallet-web run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/prism-dwallet-web", "run", "build" ]
  publicDir = "artifacts/prism-dwallet-web/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "8081"
  BASE_PATH = "/"
